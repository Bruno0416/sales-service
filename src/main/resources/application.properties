spring.application.name=sales-service

server.port=8085

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/sales
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Correccion: movemos las URLs de servicios externos a variables de entorno
catalog.service.url=http://${DB_HOST:localhost}:8084/catalog
notification.service.url=http://${DB_HOST:localhost}:8089/notifications
shipping.service.url=http://${DB_HOST:localhost}:8086/shipping
user.service.url=http://${DB_HOST:localhost}:8082/user

# Importar secretos JWT
spring.config.import=optional:file:./secrets.properties

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# SWAGGER OPEN API.
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# ---- REGISTRO EUREKA ----
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${spring.cloud.client.ip-address}:${server.port}
